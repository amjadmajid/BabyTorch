<text x='250' y='192' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>action a₁</text>
<text x='250' y='206' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>reward r₁</text>
<line x1='293' y1='151' x2='347' y2='151' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='347.0' y='132' width='86' height='38' rx='9' fill='#ddeafa' stroke='#2a78d6' stroke-width='1.5'/>
<text x='390' y='155.68' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='13' fill='#0b0b0b' font-weight='600' text-anchor='middle'>s₂</text>
<text x='390' y='192' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>action a₂</text>
<text x='390' y='206' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>reward r₂</text>
<line x1='433' y1='151' x2='477' y2='151' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='477.0' y='132' width='86' height='38' rx='9' fill='#ddeafa' stroke='#2a78d6' stroke-width='1.5'/>
<text x='520' y='155.68' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='13' fill='#0b0b0b' font-weight='600' text-anchor='middle'>…</text>
<path d='M 300 210 L 300 236' fill='none' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='110.0' y='238' width='380' height='38' rx='9' fill='#f0efec' stroke='#c3c2b7' stroke-width='1.5'/>
<text x='300' y='261.32' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='12' fill='#0b0b0b' font-weight='600' text-anchor='middle'>return  Gₜ = rₜ + γ rₜ₊₁ + γ² rₜ₊₂ + …</text>
<path d='M 300 276 L 300 302' fill='none' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='110.0' y='304' width='380' height='46' rx='9' fill='#fadcdc' stroke='#e34948' stroke-width='1.5'/>
<text x='300' y='324.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='13' fill='#0b0b0b' font-weight='600' text-anchor='middle'>loss = − log π(aₜ | sₜ) · Aₜ</text>
<text x='300' y='339.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='middle'>gradient ascent on reward</text>
<text x='300' y='372' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#898781' font-weight='normal' text-anchor='middle'>make high-advantage actions more likely</text>
<rect x='600' y='106' width='248' height='264' rx='12' fill='#ffffff' stroke='#d8d6cf' stroke-width='1.3'/>
<text x='618' y='132' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='12.5' fill='#0b0b0b' font-weight='700' text-anchor='start'>What is the advantage Aₜ?</text>
