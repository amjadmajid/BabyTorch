<text x='32' y='63' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='12' fill='#52514e' font-weight='normal' text-anchor='start'>REINFORCE → Actor-Critic → PPO differ only in the weight they put on each action</text>
<text x='40' y='112' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='12' fill='#0b0b0b' font-weight='600' text-anchor='start'>One episode, start to finish</text>
