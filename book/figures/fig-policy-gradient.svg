<text x='640' y='170' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11.5' fill='#0b0b0b' font-weight='600' text-anchor='start'>REINFORCE</text>
<text x='640' y='187' font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size='10' fill='#52514e' font-weight='normal' text-anchor='start'>Gₜ − baseline (mean)</text>
<rect x='618' y='215' width='14' height='14' rx='3' fill='#d9f3e8' stroke='#1baf7a' stroke-width='1.2'/>
<text x='640' y='228' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11.5' fill='#0b0b0b' font-weight='600' text-anchor='start'>Actor-Critic</text>
<text x='640' y='245' font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size='10' fill='#52514e' font-weight='normal' text-anchor='start'>Gₜ − V(sₜ),  V learned</text>
<rect x='618' y='273' width='14' height='14' rx='3' fill='#e5e2f6' stroke='#4a3aa7' stroke-width='1.2'/>
<text x='640' y='286' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11.5' fill='#0b0b0b' font-weight='600' text-anchor='start'>PPO</text>
<text x='640' y='303' font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size='10' fill='#52514e' font-weight='normal' text-anchor='start'>clip the ratio · Aₜ</text>
<text x='618' y='346' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10' fill='#898781' font-weight='normal' text-anchor='start'>Same gradient, better baseline:</text>
<text x='618' y='360' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10' fill='#898781' font-weight='normal' text-anchor='start'>less noise, faster learning.</text>
<rect x='40' y='453' width='14' height='12' rx='3' fill='#ddeafa' stroke='#2a78d6' stroke-width='1.2'/>
<text x='60' y='463' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>state</text>
<rect x='116.0' y='453' width='14' height='12' rx='3' fill='#f0efec' stroke='#c3c2b7' stroke-width='1.2'/>
<text x='136.0' y='463' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>return</text>
<rect x='199.2' y='453' width='14' height='12' rx='3' fill='#fadcdc' stroke='#e34948' stroke-width='1.2'/>
<text x='219.2' y='463' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>loss / gradient</text>
