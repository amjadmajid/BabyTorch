<text x='600' y='102' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#e34948' font-weight='normal' text-anchor='middle'>gradient → Q-network</text>
<text x='40' y='408' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>Act ε-greedily: a random action with probability ε (high at first, then decaying), the argmax of Q otherwise.</text>
