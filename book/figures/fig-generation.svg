</marker>
</defs>
<rect x="0.5" y="0.5" width="879" height="419" rx="14" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/>
<text x='32' y='42' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='17' fill='#0b0b0b' font-weight='700' text-anchor='start'>Generation: a classifier in a loop</text>
<text x='32' y='63' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='12' fill='#52514e' font-weight='normal' text-anchor='start'>forward the context, shape the distribution, sample one token, append, repeat</text>
<rect x='35.0' y='175.0' width='190' height='30' rx='15.0' fill='#ddeafa' stroke='#2a78d6' stroke-width='1.3'/>
<text x='130' y='194.14' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11.5' fill='#52514e' font-weight='500' text-anchor='middle'>context  "ROMEO:"</text>
<text x='130' y='218' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>cropped to the last</text>
<text x='130' y='231' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#898781' font-weight='normal' text-anchor='middle'>block_size tokens</text>
<line x1='226' y1='190' x2='262' y2='190' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='266' y='156' width='104' height='20' rx='5' fill='#ddeafa' stroke='#2a78d6' stroke-width='1.2'/>
<rect x='266' y='180' width='104' height='20' rx='5' fill='#fce3d9' stroke='#eb6834' stroke-width='1.2'/>
<rect x='266' y='204' width='104' height='20' rx='5' fill='#d9f3e8' stroke='#1baf7a' stroke-width='1.2'/>
<text x='318' y='242' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='middle'>GPT (frozen,</text>
<text x='318' y='256' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='middle'>no_grad + eval)</text>
<line x1='372' y1='190' x2='406' y2='190' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='408.0' y='175.0' width='116' height='30' rx='15.0' fill='#fcedcc' stroke='#eda100' stroke-width='1.3'/>
<text x='466' y='193.96' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11' fill='#52514e' font-weight='500' text-anchor='middle'>logits (65,)</text>
<line x1='526' y1='190' x2='558' y2='190' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='560.0' y='168' width='120' height='44' rx='9' fill='#f0efec' stroke='#c3c2b7' stroke-width='1.5'/>
<text x='620' y='187.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11' fill='#0b0b0b' font-weight='600' text-anchor='middle'>÷ temperature</text>
<text x='620' y='202.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='middle'>sharpen or flatten</text>
<line x1='680' y1='190' x2='710' y2='190' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='713.0' y='168' width='106' height='44' rx='9' fill='#f0efec' stroke='#c3c2b7' stroke-width='1.5'/>
<text x='766' y='187.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11' fill='#0b0b0b' font-weight='600' text-anchor='middle'>top-k</text>
<text x='766' y='202.0' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='middle'>drop the junk tail</text>
<line x1='766' y1='212' x2='766' y2='240' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<rect x='713.0' y='242' width='106' height='36' rx='9' fill='#f0efec' stroke='#c3c2b7' stroke-width='1.5'/>
<text x='766' y='263.42' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='9.5' fill='#0b0b0b' font-weight='600' text-anchor='middle'>softmax → sample</text>
<rect x='713.0' y='297.0' width='106' height='30' rx='15.0' fill='#fcedcc' stroke='#eda100' stroke-width='1.3'/>
<text x='766' y='315.96' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='11' fill='#52514e' font-weight='500' text-anchor='middle'>next: "e"</text>
<line x1='766' y1='280' x2='766' y2='296' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<path d='M 713 312 L 80 312 L 80 208' fill='none' stroke='#52514e' stroke-width='1.6' marker-end='url(#arr)'/>
<text x='448.0' y='328' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#898781' font-weight='normal' text-anchor='middle'>append and go around again — one token per lap</text>
<text x='40' y='362' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>temperature &lt; 1 sharpens (safe, repetitive) · = 1 is the honest learned distribution · &gt; 1 flattens toward keysmash.</text>
<text x='40' y='380' font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size='10.5' fill='#52514e' font-weight='normal' text-anchor='start'>top-k keeps only the k most likely tokens: individually-unlikely junk can add up to a big probability without it.</text>
</svg>
